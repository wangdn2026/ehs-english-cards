<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repetitive motion - 发音页</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f5f5f5; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
  .card { background:#fff; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.08); max-width:420px; width:100%; overflow:hidden; }
  .top-bar { height:6px; background:linear-gradient(90deg, #7BA7BC, #E07A5F); }
  .content { padding:32px 28px; text-align:center; }
  .vol { font-size:12px; color:#7BA7BC; margin-bottom:8px; }
  .num { display:inline-block; background:#E07A5F; color:#fff; border-radius:8px; padding:2px 12px; font-size:14px; font-weight:bold; margin-bottom:16px; }
  .en { font-size:28px; color:#3D405B; font-weight:bold; margin-bottom:8px; line-height:1.3; }
  .phonetic { font-size:16px; color:#7BA7BC; margin-bottom:6px; }
  .zh { font-size:20px; color:#3D405B; margin-bottom:20px; font-weight:500; }
  .divider { height:2px; background:#E07A5F; margin:0 auto 20px; width:60px; border-radius:1px; }
  .play-btn { display:inline-flex; align-items:center; gap:8px; background:#7BA7BC; color:#fff; border:none; border-radius:24px; padding:12px 32px; font-size:18px; cursor:pointer; transition:all .2s; }
  .play-btn:hover { background:#6B97AC; transform:scale(1.05); }
  .play-btn:active { transform:scale(0.98); }
  .play-btn .icon { font-size:22px; }
  .example { margin-top:24px; text-align:left; padding:16px; background:#f8f9fa; border-radius:10px; border-left:3px solid #7BA7BC; }
  .example-label { font-size:12px; color:#7BA7BC; font-weight:bold; margin-bottom:6px; }
  .example-en { font-size:14px; color:#3D405B; line-height:1.6; margin-bottom:4px; }
  .example-zh { font-size:13px; color:#666; line-height:1.5; }
  .footer { margin-top:24px; font-size:11px; color:#aaa; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  <div class="content">
    <div class="vol">Vol.05 人体功效学</div>
    <div class="num">#02</div>
    <div class="en">repetitive motion</div>
    <div class="phonetic">/rɪˈpetɪtɪv ˈmoʊʃn/</div>
    <div class="zh">重复性动作</div>
    <div class="divider"></div>
    <button class="play-btn" onclick="speak()">
      <span class="icon">🔊</span> 听发音
    </button>
    <div class="example">
      <div class="example-label">Example</div>
      <div class="example-en">Repetitive motion is one of the five main ergonomic hazard factors.</div>
      <div class="example-zh">重复性动作是五大工效风险因子之一。</div>
    </div>
    <div class="footer">安全五点半 · EHS英语口袋书</div>
  </div>
</div>
<script>
function speak() {
  const u = new SpeechSynthesisUtterance("repetitive motion");
  u.lang = "en-US";
  u.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
</script>
</body>
</html>
